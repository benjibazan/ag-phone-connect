<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Antigravity Phone Connect</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AG Connect">
    <link rel="apple-touch-icon" href="/icon-512.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <h1>
            <span>AG Connect</span>
        </h1>

        <div class="header-controls">
            <button class="menu-btn" id="menuBtn" aria-label="Menu" title="Switch Window">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="status-badge">
                <div class="status-dot disconnected" id="statusDot"></div>
                <span id="statusText">...</span>
            </div>
            <span class="project-name" id="projectName"></span>
            <button class="stop-btn" id="stopBtn" aria-label="STOP">
                <span>STOP</span>
            </button>
            <button class="refresh-btn" id="refreshBtn" aria-label="Refresh">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
            <button class="overflow-btn" id="overflowBtn" aria-label="More options" title="More">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <circle cx="12" cy="5" r="2"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                    <circle cx="12" cy="19" r="2"></circle>
                </svg>
            </button>
        </div>
    </header>

    <!-- Overflow Menu (rarely-used buttons) -->
    <div class="overflow-overlay" id="overflowOverlay"></div>
    <div class="overflow-menu" id="overflowMenu">
        <button class="overflow-item" id="newChatBtn">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>New Chat</span>
        </button>
        <button class="overflow-item" id="historyBtn">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>History</span>
        </button>
        <button class="overflow-item" id="filesBtn">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            <span>Files</span>
        </button>
        <button class="overflow-item" id="terminalBtn">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="12" y1="19" x2="20" y2="19"></line>
            </svg>
            <span>Terminal</span>
        </button>
        <div class="overflow-divider"></div>
        <button class="overflow-item" id="modeBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            <span id="modeText">Fast</span>
        </button>
        <button class="overflow-item" id="modelBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
            </svg>
            <span id="modelText">Select Model</span>
        </button>
        <div class="overflow-stats" id="syncStats">
            <span id="statsText" style="font-size: 11px; opacity: 0.5;">Syncing...</span>
        </div>
    </div>

    <!-- SSL Banner (shown when running HTTP) -->
    <div class="ssl-banner" id="sslBanner" style="display: none;">
        <span>⚠️ Not Secure - Running on HTTP</span>
        <button id="enableHttpsBtn" onclick="enableHttps()">Enable HTTPS</button>
        <button class="dismiss-btn" onclick="dismissSslBanner()">×</button>
    </div>

    <!-- Side Panel Overlay -->
    <div class="side-panel-overlay" id="sidePanelOverlay"></div>

    <!-- Side Panel (Window Switcher as drawer) -->
    <div class="side-panel" id="sidePanel">
        <div class="side-panel-header">
            <h2>Windows</h2>
            <button class="side-panel-close" id="sidePanelClose" aria-label="Close">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="side-panel-list" id="sidePanelList">
            <!-- Window items injected dynamically -->
        </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-content" id="chatContent">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Waiting for snapshot...</p>
            </div>
        </div>
    </div>

    <!-- Scroll to Bottom FAB -->
    <button class="fab" id="scrollToBottom" aria-label="Scroll to bottom">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M19 12l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </button>

    <!-- Workspace Opener (shown when Manager is active) -->
    <div class="workspace-opener" id="workspaceOpener" style="display: none;">
        <div class="workspace-opener-header">
            <span>📂 Open Workspace</span>
        </div>
        <div class="workspace-opener-input">
            <input type="text" id="workspacePath" placeholder="Folder name or path..." spellcheck="false"
                autocomplete="off">
            <button class="workspace-open-btn" id="workspaceOpenBtn">Open</button>
        </div>
        <div class="workspace-projects" id="workspaceProjects">
            <!-- Project tiles injected dynamically -->
        </div>
    </div>

    <!-- Quick Actions (dynamic, per-project) -->
    <div class="quick-actions" id="quickActionsBar">
        <!-- Chips rendered dynamically by JS -->
    </div>

    <!-- Recent Messages Picker (hidden by default) -->
    <div class="recent-picker" id="recentPicker" style="display: none;">
        <div class="recent-picker-header">
            <span>📋 Recent Messages</span>
            <button class="recent-close-btn" onclick="hideRecentPicker()">✕</button>
        </div>
        <div class="recent-list" id="recentList">
            <!-- Items injected dynamically -->
        </div>
    </div>

    <!-- Quick Action Editor Modal -->
    <div class="chip-editor-overlay" id="chipEditorOverlay" style="display: none;">
        <div class="chip-editor">
            <h3 id="chipEditorTitle">Edit Quick Action</h3>
            <div class="chip-editor-row">
                <input id="chipEditorEmoji" placeholder="▶" maxlength="2" class="chip-editor-emoji">
                <input id="chipEditorLabel" placeholder="Continue" class="chip-editor-label">
            </div>
            <textarea id="chipEditorText" placeholder="Message text to send..." rows="3"></textarea>
            <div class="chip-editor-actions">
                <button id="chipEditorDelete" class="chip-editor-btn delete">🗑 Delete</button>
                <button id="chipEditorCancel" class="chip-editor-btn cancel">Cancel</button>
                <button id="chipEditorSave" class="chip-editor-btn save">💾 Save</button>
            </div>
        </div>
    </div>

    <!-- Workflow Picker (hidden by default) -->
    <div class="workflow-picker" id="workflowPicker" style="display: none;">
        <div class="workflow-picker-header">
            <span>⚡ Workflows</span>
            <button class="workflow-close-btn" onclick="hideWorkflowPicker()">✕</button>
        </div>
        <div class="workflow-list" id="workflowList">
            <!-- Workflow chips injected dynamically -->
        </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
        <div class="input-wrapper">
            <input type="file" id="imageInput" accept="image/*" style="display:none" multiple>
            <button class="attach-btn" id="attachBtn" aria-label="Attach image">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path
                        d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        fill="none" />
                </svg>
            </button>
            <textarea id="messageInput" placeholder="Message..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" aria-label="Send">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="image-preview-bar" id="imagePreviewBar" style="display:none"></div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-panel" id="modalPanel">
            <div class="modal-title" id="modalTitle">Select Option</div>
            <div id="modalList"></div>
            <div style="margin-top:20px; text-align:center;">
                <button onclick="closeModal()"
                    style="background:transparent; border:none; color:var(--text-muted); padding:10px;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- History Layer (Full Screen) -->
    <div class="history-layer" id="historyLayer">
        <div class="history-header">
            <button class="icon-btn" onclick="hideChatHistory()" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>Conversations</h2>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </div>
        <div class="history-content" id="historyList">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Files Viewer Layer (Full Screen) -->
    <div class="history-layer" id="filesLayer">
        <div class="history-header">
            <button class="icon-btn" id="filesBackBtn" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2 id="filesTitle">Artifacts</h2>
            <div style="width: 24px;"></div>
        </div>
        <div class="history-content" id="filesContent">
            <!-- File list / markdown content injected here -->
        </div>
    </div>

    <!-- Terminal Layer (Full Screen) -->
    <div class="history-layer" id="terminalLayer">
        <div class="history-header">
            <button class="icon-btn" onclick="hideTerminal()" aria-label="Back">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>Terminal</h2>
            <button class="icon-btn" onclick="clearTerminal()" aria-label="Clear" title="Clear output">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                </svg>
            </button>
        </div>
        <div class="terminal-output" id="terminalOutput">
            <div class="terminal-welcome">Welcome to Antigravity Terminal<br>Type a command and press Enter</div>
        </div>
        <div class="terminal-input-bar">
            <span class="terminal-prompt">$</span>
            <input type="text" id="terminalInput" placeholder="Enter command..." autocomplete="off" autocorrect="off"
                autocapitalize="off" spellcheck="false">
            <button class="send-btn" id="terminalSendBtn" aria-label="Run">
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
                        style="fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;" />
                </svg>
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
